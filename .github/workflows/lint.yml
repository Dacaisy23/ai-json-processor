name: Code Validation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python Engine
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Auto Fix Windows Line Endings
        # Convert any trailing CRLF indicators into Linux compliance styles natively
        run: |
          find . -name "*.py" -exec sed -i 's/\r$//' {} +
          find . -name "*.json" -exec sed -i 's/\r$//' {} +
          find . -name "*.yaml" -exec sed -i 's/\r$//' {} +

      - name: Run Pre-Commit Hooks
        uses: pre-commit/action@v3.0.1
